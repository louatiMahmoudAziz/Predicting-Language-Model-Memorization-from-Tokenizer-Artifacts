# local_cpu.yaml
# Smoke-test for local CPU execution.
# Functionally identical to colab_nuke (same data, same goal) but with
# a tiny model and 100 training steps so the full pipeline runs in
# roughly 5-15 minutes on a laptop CPU.
#
# SPEC §9 Test 1 goal: verify ΔBPC math end-to-end.
# PASS criteria:
#   - repeated canaries show clearly positive ΔBPC
#   - benign controls have ΔBPC near 0

run_id: local_cpu
seed: 42

paths:
  raw_dir: data/raw
  corpus_dir: data/corpora
  candidates_dir: data/candidates
  tokenizer_dir: tokenizers/local_bpe
  ref_model_dir: models/local_ref
  target_model_dir: models/local_target
  features_dir: features
  labels_dir: labels
  results_dir: results

corpus:
  base_source: data/raw/tiny_corpus.txt
  budget_type: raw_chars
  budget_value: 500000              # 500 KB  — enough for BPE + LM smoke test
  canary:
    file: data/candidates/canaries_nuke.jsonl
    repetitions: [20, 50, 100]     # reduced reps proportional to smaller corpus

tokenizer:
  type: bpe
  vocab_size: 2000
  min_frequency: 2
  special_tokens:
    - "<unk>"
    - "<pad>"
    - "<s>"
    - "</s>"

lm:
  architecture: transformer
  d_model: 128                      # tiny: ~400 K params total
  n_heads: 2
  n_layers: 2
  d_ff: 256
  dropout: 0.1
  max_seq_len: 256
  training:
    batch_size: 8
    learning_rate: 3.0e-4
    max_steps: 100                  # ~3-5 min on CPU
    warmup_steps: 10
    weight_decay: 0.01
    log_every: 10
    eval_every: 50
    checkpoint_every: 100
  baseline_kenlm:
    enabled: false
    order: 5
    smoothing: kneser_ney

scoring:
  metric: bpc
  batch_size: 32
  add_bos: false
  add_eos: false
  allow_truncation: false

predictor:
  model_type: logistic
  max_iter: 500
  n_estimators: 100
  split:
    train: 0.6
    val: 0.2
    test: 0.2
  threshold: 0.5

evaluation:
  ranking_k: [10, 20, 30]          # K capped to realistic test-set size
  tail_fpr: [0.01]
  fpr_0_1_min_negatives: 100000
  secondary_metrics:
    - auroc
    - auprc
