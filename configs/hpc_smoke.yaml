# hpc_smoke.yaml
# Fast validation on HPC: full pipeline, small budget + few LM steps.
# Use after: pip install -r requirements.txt && pip install datasets
#            python scripts/gen_real_data.py
#
# Est. time: ~15–45 min on one GPU (depends on GPU vs T4).

run_id: hpc_smoke
seed: 42

paths:
  raw_dir: data/raw
  corpus_dir: data/corpora
  candidates_dir: data/candidates
  tokenizer_dir: tokenizers/hpc_smoke_bpe
  ref_model_dir: models/hpc_smoke_ref
  target_model_dir: models/hpc_smoke_target
  features_dir: features
  labels_dir: labels
  results_dir: results

corpus:
  base_source: data/raw/wikitext103.txt
  budget_type: raw_chars
  budget_value: 5000000                      # 5 MB — matches gen_real_data corpus slice
  candidates_file: data/candidates/candidates_real.jsonl
  canary:
    file: data/candidates/canaries_real.jsonl
    repetitions: [1, 3, 10, 50, 100]

tokenizer:
  type: bpe
  vocab_size: 8000
  min_frequency: 2
  special_tokens:
    - "<unk>"
    - "<pad>"
    - "<s>"
    - "</s>"

lm:
  architecture: transformer
  d_model: 256
  n_heads: 4
  n_layers: 4
  d_ff: 512
  dropout: 0.1
  max_seq_len: 512
  training:
    batch_size: 32
    learning_rate: 3.0e-4
    max_steps: 400                           # short — smoke only
    warmup_steps: 40
    weight_decay: 0.01
    log_every: 50
    eval_every: 200
    checkpoint_every: 400
  baseline_kenlm:
    enabled: false
    order: 5
    smoothing: kneser_ney

scoring:
  metric: bpc
  batch_size: 64
  add_bos: false
  add_eos: false
  allow_truncation: false

predictor:
  model_type: logistic
  max_iter: 500
  n_estimators: 100
  split:
    train: 0.6
    val: 0.2
    test: 0.2
  threshold: 0.5

evaluation:
  ranking_k: [50, 100, 200]
  tail_fpr: [0.01]
  fpr_0_1_min_negatives: 100000
  secondary_metrics:
    - auroc
    - auprc
